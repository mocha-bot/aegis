name: Release

on:
  push:
    tags: ['v*']

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_name: aegis-linux-amd64
          - os: macos-latest
            target: aarch64-apple-darwin
            asset_name: aegis-macos-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            asset_name: aegis-macos-amd64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset_name: aegis-windows-amd64.exe

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Strip (linux/macos)
        if: matrix.os != 'windows-latest'
        run: strip target/${{ matrix.target }}/release/aegis || true

      # Rename the binary to its platform asset name BEFORE uploading, so the
      # artifact's file (not just the artifact name) is unique. Otherwise every
      # platform uploads a file called `aegis`/`aegis.exe`, and the release job's
      # `merge-multiple: true` download collapses them onto one another.
      - name: Package
        shell: bash
        run: |
          src="target/${{ matrix.target }}/release/aegis${{ matrix.os == 'windows-latest' && '.exe' || '' }}"
          mkdir -p dist
          cp "$src" "dist/${{ matrix.asset_name }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: aegis-*
          merge-multiple: true
          path: dist

      - run: ls -lh dist/

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
