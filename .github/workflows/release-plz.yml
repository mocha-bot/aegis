name: release-plz

on:
  push:
    tags: ['v*']
    branches: [master]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-plz-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-plz-pr:
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: release-plz/action@v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  release-plz-release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      releases: ${{ steps.release.outputs.releases }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - name: release-plz release
        id: release
        uses: release-plz/action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  build-binaries:
    needs: release-plz-release
    if: ${{ needs.release-plz-release.outputs.releases_created == 'true' }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_name: aegis-linux-amd64
          - os: macos-latest
            target: aarch64-apple-darwin
            asset_name: aegis-macos-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            asset_name: aegis-macos-amd64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset_name: aegis-windows-amd64.exe
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
      - name: Strip (linux/macos)
        if: matrix.os != 'windows-latest'
        run: strip target/${{ matrix.target }}/release/aegis || true
      - name: Package
        shell: bash
        run: |
          src="target/${{ matrix.target }}/release/aegis${{ matrix.os == 'windows-latest' && '.exe' || '' }}"
          mkdir -p dist
          cp "$src" "dist/${{ matrix.asset_name }}"
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}
          if-no-files-found: error

  attach-binaries:
    needs: [release-plz-release, build-binaries]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: aegis-*
          merge-multiple: true
          path: dist
      - run: ls -lh dist/
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ fromJSON(needs.release-plz-release.outputs.releases)[0].tag }}
          files: dist/*
