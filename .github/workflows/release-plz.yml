name: release-plz

on:
  push:
    branches: [master]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-plz-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-plz-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: release-plz/action@v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  release-plz-release:
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      releases: ${{ steps.release.outputs.releases }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - name: release-plz release
        id: release
        uses: release-plz/action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  build-binaries:
    needs: release-plz-release
    if: needs.release-plz-release.outputs.releases_created == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_name: aegis-linux-amd64
          - os: macos-latest
            target: aarch64-apple-darwin
            asset_name: aegis-macos-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            asset_name: aegis-macos-amd64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset_name: aegis-windows-amd64.exe
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - run: cargo build --release --target ${{ matrix.target }}
      - if: matrix.os != 'windows-latest'
        run: strip target/${{ matrix.target }}/release/aegis || true
      - shell: bash
        run: |
          src="target/${{ matrix.target }}/release/aegis${{ matrix.os == 'windows-latest' && '.exe' || '' }}"
          mkdir -p dist
          cp "$src" "dist/${{ matrix.asset_name }}"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}

  attach-binaries:
    needs: [release-plz-release, build-binaries]
    if: needs.release-plz-release.outputs.releases_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: aegis-*
          merge-multiple: true
          path: dist

      - name: Generate checksums
        working-directory: dist
        run: sha256sum aegis-* > SHA256SUMS

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ fromJSON(needs.release-plz-release.outputs.releases)[0].tag }}
          files: dist/*

  homebrew:
    needs: [release-plz-release, attach-binaries]
    if: needs.release-plz-release.outputs.releases_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: aegis-*
          merge-multiple: true
          path: dist
      - name: Render formula
        id: render
        run: |
          (cd dist && sha256sum aegis-* > SHA256SUMS)
          version="${{ fromJSON(needs.release-plz-release.outputs.releases)[0].version }}"
          sh packaging/homebrew/render-formula.sh "$version" dist/SHA256SUMS > aegis.rb
          echo "version=$version" >> "$GITHUB_OUTPUT"
      - name: Push formula to tap
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "${TAP_TOKEN}" ]; then
            echo "HOMEBREW_TAP_TOKEN not set — skipping tap update."
            exit 0
          fi
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/mocha-bot/homebrew-tap.git" tap
          mkdir -p tap/Formula
          cp aegis.rb tap/Formula/aegis.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/aegis.rb
          if git diff --cached --quiet; then
            echo "Formula unchanged."
            exit 0
          fi
          git commit -m "aegis ${{ steps.render.outputs.version }}"
          git push
